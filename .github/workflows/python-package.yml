# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    # - name: Setup Bats and bats libs
    #   id: setup-bats
    #   uses: bats-core/bats-action@4.0.0
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest pytest-black pytest-cov pytest-mypy types-mock
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f tox.ini ]; then pip install tox; fi
#    - name: Lint with flake8
#      run: |
#        python -m pip install "flake8<5.0.0"
#        # stop the build if there are Python syntax errors or undefined names
#        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
#        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
#        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
    - name: Test with tox or pytest
      run: |
        mkdir -p build
        if [ -f tox.ini ]; then tox ; else pytest; fi

